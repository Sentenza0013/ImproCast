<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - ImproCast</title>

    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    

    <h1>Panneau d'administration</h1>
    <div class="bloc">

    <h2>Nom équipe gauche</h2>

    <input
        type="text"
        id="nomEquipeRouge"
        placeholder="Nom équipe gauche">

</div>

<div class="bloc">

    <h2>Nom équipe droite</h2>

    <input
        type="text"
        id="nomEquipeBleue"
        placeholder="Nom équipe droite">

</div>

    <div class="bloc">

        <h2>Équipe Rouge</h2>

        <button id="moinsRouge">-</button>

        <span id="scoreRouge">0</span>

        <button id="plusRouge">+</button>

    </div>

    <div class="bloc">

        <h2>Équipe Bleue</h2>

        <button id="moinsBleu">-</button>

        <span id="scoreBleu">0</span>

        <button id="plusBleu">+</button>

    </div>
    <div class="bloc">
        <div class="bloc">

    <h2>Catégorie</h2>

    <select id="categorie">

        <option>Libre</option>
        <option>Chantée</option>
        <option>Rimée</option>
        <option>Sans paroles</option>
        <option>Doublage</option>

    </select>

</div>
<div class="bloc">

    <h2>Thème</h2>

    <input
        type="text"
        id="theme"
        placeholder="Entrez le thème">

</div>

    <h2>Durée du chrono</h2>

    <input
        type="number"
        id="dureeChrono"
        value="4"
        min="1"
        max="60">

    <button id="appliquerDuree">
        Appliquer
    </button>

</div>
<div class="bloc">

    <h2>Chrono</h2>

    <button id="startChrono">Start</button>

    <button id="pauseChrono">Pause</button>

    <button id="resetChrono">Reset</button>

</div>
    <script src="js/admin.js"></script>

</body>
</html>
