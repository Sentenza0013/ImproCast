<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImproCast</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<button id="pleinEcran">
    Plein écran
</button>    
<div class="container">
    <h1>ImproCast</h1>

    <div class="scoreboard">

        <div class="equipe equipe-rouge">
            <h2 id="nomRougeAff">Les Rouges</h2>
            <p class="score" id="scoreRougeAff">0</p>
        </div>

        <div class="versus">
            VS
        </div>

        <div class="equipe equipe-bleue">
            <h2 id="nomBleuAff">Les Bleus</h2>
            <p class="score" id="scoreBleuAff">0</p>
        </div>

    </div>

    <div id="chronoAff" class="chrono">
        04:00
    </div>
</div>
    <script src="js/affichage.js"></script>
<div class="categorie">

    Catégorie :

    <span id="categorieAff">
        Libre
    </span>

</div> 
<div class="theme">

    <h3>Thème</h3>

    <p id="themeAff">
        Aucun thème
    </p>

</div>   

</body>

</html>
